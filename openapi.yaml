openapi: 3.1.1
info:
  contact:
    email: info@alkem.io
    name: Alkemio Foundation
    url: https://alkem.io
  description: |
    WOPI protocol host service for Collabora Online integration into
    the Alkemio platform. Provides token issuance, document editing
    (CheckFileInfo, GetFile, PutFile), locking, and WOPI discovery.
  license:
    name: EUPL-1.2
    url: https://opensource.org/licenses/EUPL-1.2
  title: Alkemio WOPI Service
  version: 1.0.0
paths:
  /wopi/files/{fileID}:
    get:
      operationId: github.com/alkem-io/wopi-service/internal/adapter/inbound/http.WOPIHandler.CheckFileInfo
      parameters:
        - in: path
          name: fileID
          required: true
          schema:
            type: string
          x-warning: This parameter is present in the path but not found in the code.
      responses:
        default:
          content:
            application/json:
              schema:
                type: object
          description: Default response (no response found)
    post:
      operationId: github.com/alkem-io/wopi-service/internal/adapter/inbound/http.WOPIHandler.FileOperation
      parameters:
        - in: path
          name: fileID
          required: true
          schema:
            type: string
          x-warning: This parameter is present in the path but not found in the code.
      responses:
        default:
          content:
            application/json:
              schema:
                type: object
          description: Default response (no response found)
  /wopi/files/{fileID}/contents:
    get:
      operationId: github.com/alkem-io/wopi-service/internal/adapter/inbound/http.WOPIHandler.GetFile
      parameters:
        - in: path
          name: fileID
          required: true
          schema:
            type: string
          x-warning: This parameter is present in the path but not found in the code.
      responses:
        default:
          content:
            application/json:
              schema:
                type: object
          description: Default response (no response found)
    post:
      operationId: github.com/alkem-io/wopi-service/internal/adapter/inbound/http.WOPIHandler.PutFileContents
      parameters:
        - in: path
          name: fileID
          required: true
          schema:
            type: string
          x-warning: This parameter is present in the path but not found in the code.
      responses:
        default:
          content:
            application/json:
              schema:
                type: object
          description: Default response (no response found)
  /wopi/token/:
    post:
      operationId: github.com/alkem-io/wopi-service/internal/adapter/inbound/http.RouterDeps.TokenHandler.ServeHTTP
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github.com_alkem-io_wopi-service_internal_adapter_inbound_http.tokenRequest'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github.com_alkem-io_wopi-service_internal_adapter_inbound_http.TokenIssuanceResponse'
          description: OK
        "400":
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
          description: Bad Request
        "401":
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
          description: Unauthorized
        "403":
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
          description: Forbidden
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
          description: Not Found
        "405":
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
          description: Method Not Allowed
        "500":
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
          description: Internal Server Error
      tags:
        - /wopi/token
components:
  schemas:
    github.com_alkem-io_wopi-service_internal_adapter_inbound_http.TokenIssuanceResponse:
      properties:
        accessToken:
          type: string
        accessTokenTTL:
          type: integer
        wopiSrc:
          type: string
      type: object
    github.com_alkem-io_wopi-service_internal_adapter_inbound_http.tokenRequest:
      properties:
        documentId:
          type: string
      type: object
