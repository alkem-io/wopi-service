name: Build & Deploy WOPI Service to Test on Hetzner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push image
        run: |
          IMAGE="${{ secrets.REGISTRY_LOGIN_SERVER }}/alkemio-wopi-service"
          docker build -f Dockerfile . -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'v1.31.14'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_SECRET_HETZNER_TEST }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry wopi-service-registry \
            --docker-server=${{ secrets.REGISTRY_LOGIN_SERVER }} \
            --docker-username=${{ secrets.REGISTRY_USERNAME }} \
            --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Attach image pull secret to deployment
        run: |
          kubectl patch deployment alkemio-wopi-service-deployment -p \
            '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"wopi-service-registry"}]}}}}'

      - name: Update deployment image
        run: |
          kubectl set image deployment/alkemio-wopi-service-deployment \
            alkemio-wopi-service=${{ secrets.REGISTRY_LOGIN_SERVER }}/alkemio-wopi-service:${{ github.sha }}
