name: Deploy to DockerHub

on:
  release:
    # `released` additionally covers a pre-release later promoted to a full
    # release (promotion fires no `published` event).
    types: [published, released]

# Serialize whole runs: floating tags (latest, vMAJOR, vMAJOR.MINOR) must be
# applied in publish order.
concurrency:
  group: dockerhub-release
  cancel-in-progress: false

jobs:
  release:
    uses: antst/alkemio-github-workflows/.github/workflows/container-release.yml@v1
    permissions:
      contents: read
    secrets: inherit
