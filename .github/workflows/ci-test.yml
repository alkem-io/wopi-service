name: CI — Lint & Test

on:
  push:
    branches: [develop, main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ci:
    uses: alkem-io/github-workflows/.github/workflows/go-ci.yml@v1
    permissions:
      contents: read
    with:
      sqlc-config: sqlc.yaml
      sqlc-generated-path: internal/adapter/outbound/postgres/generated
      openapi-make-target: openapi
