name: CI — Lint & Test

on:
  push:
    branches: [develop, main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./... -race -count=1 -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  test-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t wopi-service:test .

      - name: Verify container starts
        run: |
          docker run --rm \
            -e WOPI_DATABASE_HOST=localhost \
            -e WOPI_DATABASE_PORT=5432 \
            -e WOPI_DATABASE_USERNAME=test \
            -e WOPI_DATABASE_PASSWORD=test \
            -e WOPI_DATABASE_NAME=wopi \
            -e NATS_URL=nats://localhost:4222 \
            -e FILE_SERVICE_URL=http://localhost:4003 \
            -e WOPI_COLLABORA_URL=http://localhost:9980 \
            -e WOPI_BASE_URL=http://localhost:8080 \
            -e WOPI_TOKEN_SECRET=ci-test-secret \
            -e WOPI_SERVER_PORT=8080 \
            wopi-service:test --help 2>&1 || true
          echo "Container built and binary runs"

  openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install apispec
        run: go install github.com/ehabterra/apispec/cmd/apispec@latest

      - name: Generate OpenAPI spec
        run: make openapi

      - name: Verify openapi.yaml is up to date
        run: |
          git diff --exit-code openapi.yaml || {
            echo "::error::openapi.yaml is stale. Run 'make openapi' and commit."
            exit 1
          }

  sqlc-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Verify sqlc generated code is up to date
        run: |
          sqlc generate
          git diff --exit-code internal/adapter/outbound/postgres/generated/ || {
            echo "::error::sqlc generated code is stale. Run 'sqlc generate' and commit."
            exit 1
          }
