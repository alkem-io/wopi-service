apiVersion: apps/v1
kind: Deployment
metadata:
  name: alkemio-wopi-service-deployment
  labels:
    app: alkemio-wopi-service
    k8s-app: alkemio-wopi-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alkemio-wopi-service
  template:
    metadata:
      labels:
        app: alkemio-wopi-service
    spec:
      containers:
        - name: alkemio-wopi-service
          image: alkemio/wopi-service:v0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: WOPI_DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: DATABASE_HOST
            - name: WOPI_DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: DATABASE_PORT
            - name: WOPI_DATABASE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: POSTGRES_USER
            - name: WOPI_DATABASE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: POSTGRES_PASSWORD
            - name: WOPI_DATABASE_NAME
              value: "wopi"
            - name: WOPI_DATABASE_TIMEOUT
              value: "5s"
            - name: WOPI_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: alkemio-secrets
                  key: WOPI_TOKEN_SECRET
            - name: WOPI_SERVER_PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: AUTH_SERVICE_URL
            - name: FILE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: FILE_SERVICE_URL
            - name: WOPI_COLLABORA_URL
              value: "http://collabora:9980"
            - name: VITE_APP_ALKEMIO_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: VITE_APP_ALKEMIO_DOMAIN
            - name: WOPI_BASE_URL
              value: "$(VITE_APP_ALKEMIO_DOMAIN)"
            - name: WOPI_CALLBACK_URL
              value: "http://alkemio-wopi-service:8080"
            - name: WOPI_PROOF_VALIDATION
              value: "false"
          # Readiness: checks dependencies (DB, NATS). Pulls the pod from the
          # Service when deps are unreachable so traffic doesn't hit a broken
          # instance.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # Liveness: process-local check only, no deps. Restarting the pod when
          # the DB is down would not fix anything; the separate /live endpoint
          # avoids amplifying an outage.
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: alkemio-file-service
                topologyKey: kubernetes.io/hostname
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: alkemio-authorization-evaluation-service
                topologyKey: kubernetes.io/hostname
