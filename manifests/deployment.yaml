apiVersion: apps/v1
kind: Deployment
metadata:
  name: alkemio-wopi-service-deployment
  labels:
    app: alkemio-wopi-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alkemio-wopi-service
  template:
    metadata:
      labels:
        app: alkemio-wopi-service
    spec:
      imagePullSecrets:
        - name: wopi-service-registry
      containers:
        - name: alkemio-wopi-service
          image: alkemio/wopi-service:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: WOPI_DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: wopi-service-secrets
                  key: database-host
            - name: WOPI_DATABASE_PORT
              value: "5432"
            - name: WOPI_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wopi-service-secrets
                  key: database-username
            - name: WOPI_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wopi-service-secrets
                  key: database-password
            - name: WOPI_DATABASE_NAME
              value: "wopi"
            - name: WOPI_DATABASE_TIMEOUT
              value: "5s"
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: wopi-service-secrets
                  key: nats-url
            - name: FILE_SERVICE_URL
              value: "http://storage-service:4003"
            - name: WOPI_COLLABORA_URL
              valueFrom:
                configMapKeyRef:
                  name: wopi-service-config
                  key: collabora-url
            - name: WOPI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: wopi-service-config
                  key: wopi-base-url
            - name: WOPI_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: wopi-service-secrets
                  key: token-secret
            - name: WOPI_SERVER_PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
