apiVersion: apps/v1
kind: Deployment
metadata:
  name: alkemio-wopi-service-deployment
  labels:
    app: alkemio-wopi-service
    k8s-app: alkemio-wopi-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alkemio-wopi-service
  template:
    metadata:
      labels:
        app: alkemio-wopi-service
    spec:
      containers:
        - name: alkemio-wopi-service
          image: alkemio/wopi-service:v0.0.1
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: WOPI_DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: DATABASE_HOST
            - name: WOPI_DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: DATABASE_PORT
            - name: WOPI_DATABASE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: POSTGRES_USER
            - name: WOPI_DATABASE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: POSTGRES_PASSWORD
            - name: WOPI_DATABASE_NAME
              value: "wopi"
            - name: WOPI_DATABASE_TIMEOUT
              value: "5s"
            - name: AUTH_SERVICE_URL
              value: "http://alkemio-authorization-evaluation-service:6060"
            - name: FILE_SERVICE_URL
              value: "http://alkemio-file-service-service:4003"
            - name: WOPI_COLLABORA_URL
              value: "http://collabora:9980"
            - name: WOPI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: alkemio-config
                  key: WOPI_BASE_URL
            - name: WOPI_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: alkemio-secrets
                  key: WOPI_TOKEN_SECRET
            - name: WOPI_SERVER_PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: alkemio-file-service
                topologyKey: kubernetes.io/hostname
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: alkemio-authorization-evaluation-service
                topologyKey: kubernetes.io/hostname
