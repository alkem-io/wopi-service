services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wopi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  wopi-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      WOPI_DATABASE_HOST: postgres
      WOPI_DATABASE_PORT: "5432"
      WOPI_DATABASE_USERNAME: postgres
      WOPI_DATABASE_PASSWORD: postgres
      WOPI_DATABASE_NAME: wopi
      WOPI_DATABASE_TIMEOUT: 5s
      AUTH_SERVICE_URL: http://authorization-evaluation-service:6060
      FILE_SERVICE_URL: http://file-service:4003
      WOPI_COLLABORA_URL: http://collabora:9980
      WOPI_BASE_URL: http://localhost:8080
      WOPI_TOKEN_SECRET: dev-secret-change-in-production
      WOPI_SERVER_PORT: "8080"
      WAIT_HOSTS: postgres:5432
      WAIT_HOSTS_TIMEOUT: 30
    depends_on:
      - postgres

volumes:
  pgdata:
